{{- $dest := .Destination -}}
{{- $isExternal := or (strings.HasPrefix $dest "http://") (strings.HasPrefix $dest "https://") -}}

{{- if $isExternal -}}
  <a href="{{ $dest }}"{{ with .Title }} title="{{ . }}"{{ end }} target="_blank" rel="noopener">
    {{ .Text }}
  </a>
{{- else -}}
  {{- partial "safelink" (dict "page" $dest "text" .PlainText) -}}
{{- end -}}
